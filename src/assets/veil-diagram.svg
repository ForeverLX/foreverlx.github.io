<text x="385" y="475" fill="#8B93A6" font-size="9" opacity="0.5">WireGuard iOS</text>
<!-- CLIENT badge -->
<rect x="469" y="420" width="50" height="14" rx="3"
      fill="#131826" stroke="#8B93A6" stroke-width="0.5" stroke-opacity="0.35"/>
<circle cx="479" cy="427" r="2.5" fill="#8B93A6" opacity="0.6"/>
<text x="485" y="431" fill="#8B93A6" font-size="8" opacity="0.7">CLIENT</text>

<!-- ── Animated pulse circles (drawn last, above cards) ─────── -->
<!-- Each circle travels from Cerberus outward along its spoke. -->
<!-- animateMotion path matches the visible line segment.       -->

<!-- Pulse → NightForge -->
<circle r="2.5" fill="#8B6FEF" opacity="0">
  <animateMotion path="M 347,220 L 250,160" dur="2.4s"
                 repeatCount="indefinite" begin="0s"/>
  <animate attributeName="opacity"
           values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1"
           dur="2.4s" repeatCount="indefinite" begin="0s"/>
</circle>

<!-- Pulse → Tairn -->
<circle r="2.5" fill="#8B6FEF" opacity="0">
  <animateMotion path="M 553,220 L 650,160" dur="2.4s"
                 repeatCount="indefinite" begin="0.9s"/>
  <animate attributeName="opacity"
           values="0;0.9;0.9;0" keyTimes="0;0.12;0.88;1"
           dur="2.4s" repeatCount="indefinite" begin="0.9s"/>
</circle>

<!-- Pulse → iPhone (shorter spoke, faster) -->
<circle r="2.5" fill="#8B6FEF" opacity="0">
  <animateMotion path="M 450,348 L 450,412" dur="1.6s"
                 repeatCount="indefinite" begin="0.45s"/>
  <animate attributeName="opacity"
           values="0;0.9;0.9;0" keyTimes="0;0.15;0.85;1"
           dur="1.6s" repeatCount="indefinite" begin="0.45s"/>
</circle>

</svg>
