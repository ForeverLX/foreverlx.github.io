<!-- ── Connection lines (drawn before cards) ────────────────── -->
<!-- Cerberus left edge (347,220) → NightForge bottom edge (250,160) -->
<line x1="347" y1="220" x2="250" y2="160"
      stroke="#8B6FEF" stroke-width="1" opacity="0.2"/>
<!-- Cerberus right edge (553,220) → Tairn bottom edge (650,160) -->
<line x1="553" y1="220" x2="650" y2="160"
      stroke="#8B6FEF" stroke-width="1" opacity="0.2"/>
<!-- Cerberus bottom center (450,348) → iPhone top center (450,412) -->
<line x1="450" y1="348" x2="450" y2="412"
      stroke="#8B6FEF" stroke-width="1" opacity="0.2"/>

<!-- wg0 labels at spoke midpoints -->
<text x="291" y="186" fill="#8B6FEF" font-size="8" opacity="0.35">wg0</text>
<text x="608" y="186" fill="#8B6FEF" font-size="8" opacity="0.35">wg0</text>
<text x="457" y="382" fill="#8B6FEF" font-size="8" opacity="0.35">wg0</text>

<!-- ══════════════════════════════════════════════════════════ -->
<!--  CERBERUS — hub, center, dominant                        -->
<!--  Card: x=347 y=218 w=206 h=130                          -->
<!-- ══════════════════════════════════════════════════════════ -->
<rect x="347" y="218" width="206" height="130" rx="8"
      fill="#0D0F1A" stroke="#1E2030" stroke-width="1"/>
<!-- Top inner edge highlight -->
<line x1="355" y1="219" x2="545" y2="219"
      stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
<!-- Node name -->
<text x="360" y="244" fill="#8B6FEF" font-size="13" font-weight="600">CERBERUS</text>
<!-- IP -->
<text x="360" y="260" fill="#8B93A6" font-size="10">10.0.0.1</text>
<!-- Role -->
<text x="360" y="274" fill="#8B93A6" font-size="9">Arch Linux · Hub</text>
<!-- Detail -->
<text x="360" y="287" fill="#8B93A6" font-size="9">Podman Quadlets</text>
<!-- Port -->
<text x="360" y="300" fill="#8B93A6" font-size="9">:51820</text>
<!-- ACTIVE status badge (top-right) -->
<rect x="493" y="226" width="52" height="14" rx="3"
      fill="#071C0F" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.5"/>
<circle cx="503" cy="233" r="2.5" fill="#22C55E"/>
<text x="509" y="237" fill="#22C55E" font-size="8">ACTIVE</text>

<!-- ══════════════════════════════════════════════════════════ -->
<!--  NIGHTFORGE — top-left, operator workstation             -->
<!--  Card: x=78 y=55 w=175 h=105                            -->
<!-- ══════════════════════════════════════════════════════════ -->
<rect x="78" y="55" width="175" height="105" rx="6"
      fill="#0D0F1A" stroke="#1E2030" stroke-width="1"/>
<line x1="84" y1="56" x2="247" y2="56"
      stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
<text x="90" y="79"  fill="#E6B450" font-size="12" font-weight="600">NIGHTFORGE</text>
<text x="90" y="93"  fill="#8B93A6" font-size="10">10.0.0.3</text>
<text x="90" y="106" fill="#8B93A6" font-size="9">Arch Linux · Workstation</text>
<text x="90" y="118" fill="#8B93A6" font-size="9">Niri WM · Neovim</text>
<text x="90" y="130" fill="#8B93A6" font-size="9">:51821</text>
<!-- ACTIVE badge -->
<rect x="193" y="63" width="52" height="14" rx="3"
      fill="#071C0F" stroke="#22C55E" stroke-width="0.5" stroke-opacity="0.5"/>
<circle cx="203" cy="70" r="2.5" fill="#22C55E"/>
<text x="209" y="74" fill="#22C55E" font-size="8">ACTIVE</text>

<!-- ══════════════════════════════════════════════════════════ -->
<!--  TAIRN — top-right, attack node                          -->
<!--  Card: x=647 y=55 w=175 h=105                           -->
<!-- ══════════════════════════════════════════════════════════ -->
<rect x="647" y="55" width="175" height="105" rx="6"
      fill="#0D0F1A" stroke="#1E2030" stroke-width="1"/>
<line x1="653" y1="56" x2="816" y2="56"
      stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
<text x="659" y="79"  fill="#E6B450" font-size="12" font-weight="600">TAIRN</text>
<text x="659" y="93"  fill="#8B93A6" font-size="10">10.0.0.4</text>
<text x="659" y="106" fill="#8B93A6" font-size="9">NixOS 24.11 · Attack Node</text>
<text x="659" y="118" fill="#8B93A6" font-size="9">Mythic C2 · Docker</text>
<text x="659" y="130" fill="#8B93A6" font-size="9">:50555</text>
